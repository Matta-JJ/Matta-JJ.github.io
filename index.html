<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matta — Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#081B33;
    --navy-panel:#123056;
    --grid-line:#20456f;
    --paper:#EDE6D6;
    --paper-dim:#B9C6D6;
    --aws-orange:#FF9900;
    --wire-cyan:#63C4D6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--navy-deep);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    background-image:
      repeating-linear-gradient(0deg, rgba(99,196,214,0.055) 0px, rgba(99,196,214,0.055) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(99,196,214,0.055) 0px, rgba(99,196,214,0.055) 1px, transparent 1px, transparent 40px);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  h1,h2{font-family:'Space Grotesk',sans-serif; margin:0;}
  .card{
    max-width:640px;
    width:100%;
    text-align:center;
  }
  .stamp{
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--aws-orange);
    border:1px solid var(--aws-orange);
    padding:4px 10px;
    border-radius:2px;
    margin-bottom:18px;
  }
  h1{
    font-size:clamp(32px,6vw,52px);
    letter-spacing:-0.5px;
  }
  h1 span{color:var(--wire-cyan);}
  p.sub{
    color:var(--paper-dim);
    font-size:15px;
    line-height:1.6;
    max-width:480px;
    margin:16px auto 36px;
  }
  .links{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
  }
  .links a{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    letter-spacing:1px;
    text-decoration:none;
    color:var(--paper);
    border:1px solid var(--grid-line);
    background:var(--navy-panel);
    padding:12px 20px;
    border-radius:6px;
    transition:border-color .15s ease, transform .15s ease;
  }
  .links a:hover{
    border-color:var(--aws-orange);
    transform:translateY(-2px);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="stamp mono">PORTFOLIO</div>
    <h1>Hi, I'm <span>Matta</span></h1>
    <p class="sub">This is home base. Below are the things I'm building and studying — updated as I go.</p>
    <div class="links">
      <a href="mattaStudies/">📚 mattaStudies</a>
      <!-- Add more links here as you build out projects, e.g.: -->
      <!-- <a href="projects/">💼 Projects</a> -->
    </div>
  </div>
</body>
</html>
